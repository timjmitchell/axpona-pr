# @generated by /derive-topology on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# AXPONA — Agentic Explicit-Enterprise Stack
#
# Data layer: Supabase (PostgreSQL + pgvector + REST API + Studio)
#   Managed separately via `npx supabase start` — not in this compose file.
#   See supabase/config.toml for configuration.
#
# This compose file covers supplementary services that Supabase doesn't provide:
#   Qdrant (vector search — legacy, migrating to pgvector)
#   Neo4j (domain model graph visualization)
#   Agent Runtime + API + Pipeline
#
# Usage:
#   npx supabase start                     # Start Supabase (PostgreSQL, Studio, API)
#   docker compose up -d                   # Start supplementary services
#   npx supabase db reset                  # Apply migrations + seed data
#   cd mirror/application/evidence-app && npm run dev  # Start dashboards

services:

  # ── Supplementary Data Layer ──────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.12
    container_name: axpona-qdrant
    ports:
      - "6340:6333"    # REST — avoids semops-hub-pr 6333, research-pr 6335
      - "6341:6334"    # gRPC — avoids semops-hub-pr 6334, research-pr 6336
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: axpona-neo4j
    environment:
      NEO4J_AUTH: none
    ports:
      - "7476:7474"            # HTTP — avoids semops-hub-pr 7474, research-pr 7475
      - "7689:7687"            # Bolt — avoids semops-hub-pr 7687, research-pr 7688
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Agent Runtime ──────────────────────────────────────────

  agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: axpona-agent
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5440/postgres
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8200:8000"            # Agent runtime — deployment repo range
    depends_on:
      qdrant:
        condition: service_healthy

  # ── API Layer ──────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: axpona-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5440/postgres
    ports:
      - "8280:8080"            # API — deployment repo range

  # ── Pipeline (on-demand) ───────────────────────────────────

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: axpona-pipeline
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5440/postgres
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      qdrant:
        condition: service_healthy
    profiles:
      - pipeline    # Only runs on-demand: docker compose --profile pipeline run pipeline <stage>

volumes:
  qdrant_data:
  neo4j_data:
