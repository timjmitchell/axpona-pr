# @generated by /derive-topology on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# AXPONA — Agentic Explicit-Enterprise Stack
#
# Derived from K8s projection manifests (projection/*.yaml).
# Local development equivalent of the production K8s deployment.
#
# Architecture:
#   PostgreSQL (domain model, 26 tables) + Qdrant (corpus) +
#   Agent Runtime (38 capabilities) + API (registration, portals) +
#   Pipeline (bronze → silver → gold)
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up postgres qdrant # Start data layer only
#   docker compose run pipeline bronze   # Run bronze extraction
#   docker compose run pipeline silver   # Run silver transform
#   docker compose run pipeline gold     # Run gold analytics
#   docker compose run pipeline post_show # Run full post-show pipeline

services:

  # ── Data Layer ─────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: axpona-postgres
    environment:
      POSTGRES_DB: axpona
      POSTGRES_USER: ${POSTGRES_USER:-axpona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axpona_dev}
    ports:
      - "5440:5432"            # Avoids semops-hub-pr 5434
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./mirror/infrastructure/schemas/axpona-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axpona}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12
    container_name: axpona-qdrant
    ports:
      - "6340:6333"    # REST — avoids semops-hub-pr 6333, research-pr 6335
      - "6341:6334"    # gRPC — avoids semops-hub-pr 6334, research-pr 6336
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: axpona-neo4j
    environment:
      NEO4J_AUTH: none
    ports:
      - "7476:7474"            # HTTP — avoids semops-hub-pr 7474, research-pr 7475
      - "7689:7687"            # Bolt — avoids semops-hub-pr 7687, research-pr 7688
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Agent Runtime ──────────────────────────────────────────

  agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: axpona-agent
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-axpona}:${POSTGRES_PASSWORD:-axpona_dev}@postgres:5432/axpona
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8200:8000"            # Agent runtime — deployment repo range
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ── API Layer ──────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: axpona-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-axpona}:${POSTGRES_PASSWORD:-axpona_dev}@postgres:5432/axpona
    ports:
      - "8280:8080"            # API — deployment repo range
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pipeline (on-demand) ───────────────────────────────────

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: axpona-pipeline
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-axpona}:${POSTGRES_PASSWORD:-axpona_dev}@postgres:5432/axpona
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles:
      - pipeline    # Only runs on-demand: docker compose --profile pipeline run pipeline <stage>

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
