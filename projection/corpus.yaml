# @generated by /scale-project on 2026-04-07T00:00:00Z, target: axpona-pr
# Capability: all agent reasoning (corpus = institutional knowledge)
# Vector: data-complexity (unstructured → structured maturity path)
# Gap: Clean — Qdrant handles the corpus, agents query it
#
# Chain: all-patterns → agent-reasoning → StatefulSet (vector DB)
# The corpus holds: forum crawls, on-site captures, sentiment data,
# exhibitor history, show research, purchase diligence (restricted).
# Agents query corpus to ground decisions in evidence.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: axpona
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12
          ports:
            - containerPort: 6333    # REST
            - containerPort: 6334    # gRPC
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi  # corpus + embeddings
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: axpona
spec:
  selector:
    app: qdrant
  ports:
    - name: rest
      port: 6333
    - name: grpc
      port: 6334
  clusterIP: None
