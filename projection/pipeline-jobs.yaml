# @generated by /scale-project on 2026-04-07T00:00:00Z, target: axpona-pr
# Capability: bronze extraction, silver transform, gold analytics
# Vector: throughput (batch — per-edition refresh cycle)
# Gap: Clean — batch jobs on an annual cycle
#
# Chain: data-pipeline-manifests → extraction+transform+analytics → CronJob
# Three-stage pipeline: bronze (extract from sources) → silver (conform to
# domain model) → gold (analytical metrics). Runs per-edition, not real-time.

# --- Bronze: Corpus Ingestion ---
# Ingest new sources into corpus + extract structured data to bronze layer
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bronze-ingestion
  namespace: axpona
spec:
  schedule: "0 6 * * 1"           # Weekly during off-season
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: bronze
              image: axpona/pipeline:latest
              command: ["python", "-m", "pipeline.bronze"]
              env:
                - name: DATABASE_URL
                  value: postgresql://postgres:5432/axpona
                - name: QDRANT_URL
                  value: http://qdrant:6333
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
          restartPolicy: OnFailure
---
