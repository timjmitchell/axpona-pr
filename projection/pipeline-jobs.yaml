# --- Post-Show Burst ---
# One-time job triggered after EventConcluded — runs full pipeline + reports
apiVersion: batch/v1
kind: Job
metadata:
  name: post-show-pipeline
  namespace: axpona
spec:
  template:
    spec:
      containers:
        - name: post-show
          image: axpona/pipeline:latest
          command: ["python", "-m", "pipeline.post_show"]
          env:
