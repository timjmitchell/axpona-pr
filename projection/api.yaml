# @generated by /scale-project on 2026-04-07T00:00:00Z, target: axpona-pr
# Capability: exhibitor portal, registration, lead capture, dashboards
# Vector: concurrent-users (3 staff + 750 exhibitors + 8600 attendees during show)
# Gap: Concerning — replaces Unity Event Solutions for registration. Must handle
#      show-week traffic spike (thousands of registrations + check-ins over 3 days).
#
# Chain: attendee-registration + lead-capture + exhibitor-portal → Deployment+HPA
# Stateless API serving the domain model. Replaces vendor portals with owned UI.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: axpona
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: axpona/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:5432/axpona
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: axpona
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 1
  maxReplicas: 10    # show-week burst: registration + check-in + lead capture
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: axpona
spec:
  selector:
    app: api
  ports:
    - port: 8080
