# @generated by /scale-project on 2026-04-07T00:00:00Z, target: axpona-pr
# Capability: all 38 capabilities via agent execution
# Vector: concurrent-users (3 staff + agents), throughput (live show burst)
# Gap: Concerning — live show creates 3-day burst of concurrent agent workflows
#
# Chain: all-process-catalogs → agent-prescriptions → Deployment+HPA
# The agent runtime serves all 19 processes across 8 bounded contexts.
# Agents operate directly on PostgreSQL (domain model) and Qdrant (corpus).
# Human-in-the-loop for reasoning/judgment capabilities.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: axpona
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
    spec:
      containers:
        - name: agent
          image: axpona/agent-runtime:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:5432/axpona
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-credentials
                  key: api-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-runtime-hpa
  namespace: axpona
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-runtime
  minReplicas: 1
  maxReplicas: 5     # burst during live show (3 days)
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: axpona
spec:
  selector:
    app: agent-runtime
  ports:
    - port: 8000
