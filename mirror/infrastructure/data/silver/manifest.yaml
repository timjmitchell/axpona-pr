# @generated by /derive-manifests on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# Silver Layer — Transformation Rules
# Domain-organized. ACL boundary where vendor schemas conform to DDD ubiquitous language.

transforms:

  - id: exhibitor_conformed
    bounded_context: exhibitor
    description: "Conform CRM/spreadsheet exhibitor data to domain model. Map vendor fields to ubiquitous language."
    sources:
      - bronze: crm-exhibitors
    output_schema:
      grain: "one row per exhibitor"
      key: [exhibitor_id]
      columns:
        - exhibitor_id        # generated or CRM ID
        - company_name        # from CRM contact
        - category            # audio taxonomy — may need manual classification
        - exhibitor_type      # brand/dealer/distributor/manufacturer
        - current_tier        # standard/preferred/premium/founding
        - first_edition       # FK to dim_edition
        - editions_attended   # computed from history
        - contact_name
        - contact_email
    acl_notes: >
      CRM field names likely differ from domain model (e.g., "Company" → company_name,
      "Status" → lifecycle_state). Exhibitor category taxonomy (audio, accessories,
      media, etc.) may need manual classification if CRM uses free-text.

  - id: exhibitor_edition_enriched
    bounded_context: exhibitor
    description: "Per-edition exhibitor facts with computed metrics"
    sources:
      - bronze: crm-exhibitors  # exhibitor_editions + rebooking_records
      - bronze: floor-plan-spaces  # space assignments for revenue data
    output_schema:
      grain: "one row per exhibitor per edition"
      key: [exhibitor_id, edition_id]
      columns:
        - exhibitor_id
        - edition_id
        - space_type
        - contract_value
        - services_revenue
        - total_revenue       # computed: contract_value + services_revenue
        - is_returning        # computed: exhibitor appeared in prior edition
        - rebooked_within_30d # from rebooking records
        - lifecycle_state
        - priority_points

  - id: sponsorship_conformed
    bounded_context: sponsorship
    description: "Conform sponsorship tracking data to domain model"
    sources:
      - bronze: crm-sponsors
    output_schema:
      grain: "one row per sponsorship × deliverable per edition"
      key: [sponsorship_id, deliverable_type]
      columns:
        - sponsorship_id
        - sponsor_id
        - edition_id
        - package_tier
        - deliverable_type
        - deliverable_value
        - delivery_status
        - is_renewal          # computed: sponsor appeared in prior edition

  - id: space_assignment_enriched
    bounded_context: exhibition-space
    description: "Space assignments with revenue per sqft computation"
    sources:
      - bronze: floor-plan-spaces
    output_schema:
      grain: "one row per space per edition"
      key: [space_id, edition_id]
      columns:
        - space_id
        - edition_id
        - space_type
        - sqft
        - exhibitor_id
        - assignment_status
        - list_price
        - actual_price
        - revenue_per_sqft    # computed: actual_price / sqft

  - id: registration_conformed
    bounded_context: attendee
    description: "Conform Unity Event Solutions registration exports to domain model"
    sources:
      - bronze: unity-registrations
    output_schema:
      grain: "one row per attendee per edition"
      key: [attendee_id, edition_id]
      columns:
        - attendee_id
        - edition_id
        - ticket_type         # mapped to domain enum
        - ticket_price
        - checked_in
        - is_returning        # computed: attendee in prior edition
    acl_notes: >
      Unity Event Solutions field names need mapping to domain model.
      Ticket type taxonomy must conform to domain enum (general_admission,
      friday_pass, saturday_pass, sunday_pass, vip, trade_pass).

  - id: lead_capture_conformed
    bounded_context: interaction
    description: "Conform badge scan data to lead capture domain model"
    sources:
      - bronze: badge-scanning-leads
    output_schema:
      grain: "one row per scan event"
      key: [interaction_id, exhibitor_id, attendee_id]
      columns:
        - interaction_id
        - exhibitor_id
        - attendee_id
        - edition_id
        - scan_timestamp
        - space_id
        - lead_status         # initially 'captured' — lifecycle managed post-extraction

  - id: sentiment_enriched
    bounded_context: null  # cross-context analytical data
    description: "Structured sentiment from forum crawls — enriched extraction output"
    sources:
      - bronze: forum-crawls
    output_schema:
      grain: "one row per sentiment signal"
      key: [signal_id]
      columns:
        - signal_id
        - source_forum
        - thread_id
        - polarity            # positive/negative/neutral/mixed
        - category            # product/experience/industry/logistics/room/venue/value
        - text_excerpt
        - confidence
    acl_notes: "Pre-existing staging data (sentiment-extraction.json) already conformed."
