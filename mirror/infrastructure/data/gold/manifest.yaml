# @generated by /derive-manifests on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# Gold Layer — Analytical Models
# Analytics pattern → fact tables + metrics. Every metric traces to a pattern.

fact_tables:

  - id: fact_exhibitor_edition
    description: "Per-exhibitor per-edition performance — the core analytical grain"
    grain: "one row per exhibitor per edition"
    source_transform: exhibitor_edition_enriched
    pattern: exhibitor-retention-analytics
    contexts: [exhibitor, exhibition-space, finance]
    refresh: per-edition
    columns:
      - exhibitor_id
      - edition_id
      - space_type
      - contract_value
      - services_revenue
      - total_revenue
      - is_returning
      - rebooked_within_30d
      - priority_points
      - lifecycle_state

  - id: fact_sponsorship_delivery
    description: "Per-sponsorship deliverable tracking with yield metrics"
    grain: "one row per sponsorship × deliverable"
    source_transform: sponsorship_conformed
    pattern: sponsorship-yield-analytics
    contexts: [sponsorship, finance]
    refresh: per-edition
    columns:
      - sponsorship_id
      - sponsor_id
      - edition_id
      - package_tier
      - deliverable_type
      - deliverable_value
      - delivery_status
      - is_renewal

  - id: fact_space_assignment
    description: "Per-space per-edition utilization and revenue"
    grain: "one row per space per edition"
    source_transform: space_assignment_enriched
    pattern: space-utilization-analytics
    contexts: [exhibition-space, exhibitor]
    refresh: per-edition
    columns:
      - space_id
      - edition_id
      - space_type
      - sqft
      - exhibitor_id
      - assignment_status
      - actual_price
      - revenue_per_sqft

  - id: fact_edition_pnl
    description: "Per-edition P&L — the project-level financial summary"
    grain: "one row per edition"
    source_transform: null  # aggregated from other facts + accounting data
    pattern: edition-performance-analytics
    contexts: [event, finance]
    refresh: per-edition
    columns:
      - edition_id
      - exhibitor_revenue
      - sponsorship_revenue
      - ticket_revenue
      - services_revenue
      - total_revenue
      - total_cost
      - margin
      - attendee_count
      - exhibitor_count
      - sponsor_count

  - id: fact_registration
    description: "Per-attendee per-edition registration and check-in"
    grain: "one row per attendee per edition"
    source_transform: registration_conformed
    pattern: attendee-demand-analytics
    contexts: [attendee]
    refresh: per-edition
    columns:
      - attendee_id
      - edition_id
      - ticket_type
      - ticket_price
      - checked_in
      - is_returning

  - id: fact_lead_capture
    description: "Per-scan lead capture events"
    grain: "one row per scan event"
    source_transform: lead_capture_conformed
    pattern: lead-effectiveness-analytics
    contexts: [interaction, exhibitor]
    refresh: per-edition
    columns:
      - interaction_id
      - exhibitor_id
      - attendee_id
      - edition_id
      - scan_timestamp
      - space_id
      - lead_status

# ── Metrics ──────────────────────────────────────────────────────────────

metrics:

  # Exhibitor Retention (CORE)
  - id: rebooking_rate_30d
    name: "Exhibitor Rebooking Rate (30-day)"
    formula: "SUM(rebooked_within_30d) / COUNT(*) FROM fact_exhibitor_edition WHERE edition_id = ?"
    pattern: exhibitor-retention-analytics
    dimensions: [edition_id, space_type]
    refresh: per-edition
  - id: net_exhibitor_growth
    name: "Net Exhibitor Growth"
    formula: "COUNT(new) - COUNT(churned) per edition"
    pattern: exhibitor-retention-analytics
    dimensions: [edition_id]
    refresh: per-edition
  - id: avg_contract_value
    name: "Average Contract Value"
    formula: "SUM(total_revenue) / COUNT(DISTINCT exhibitor_id) FROM fact_exhibitor_edition"
    pattern: exhibitor-retention-analytics
    dimensions: [edition_id, space_type]
    refresh: per-edition
  - id: services_attach_rate
    name: "Services Attach Rate"
    formula: "COUNT(WHERE services_revenue > 0) / COUNT(*) FROM fact_exhibitor_edition"
    pattern: exhibitor-retention-analytics
    dimensions: [edition_id]
    refresh: per-edition

  # Sponsorship Yield (CORE)
  - id: sponsorship_fill_rate
    name: "Sponsorship Fill Rate"
    formula: "COUNT(WHERE availability_status = 'sold') / COUNT(*) FROM sponsorship_package"
    pattern: sponsorship-yield-analytics
    dimensions: [edition_id, category, tier]
    refresh: per-edition
  - id: sponsorship_cpm
    name: "Sponsorship CPM Equivalent"
    formula: "SUM(sponsorship_revenue) / (attendee_count / 1000)"
    pattern: sponsorship-yield-analytics
    dimensions: [edition_id]
    refresh: per-edition
  - id: sponsorship_renewal_rate
    name: "Sponsorship Renewal Rate"
    formula: "COUNT(WHERE is_renewal = 1) / COUNT(*) FROM fact_sponsorship_delivery"
    pattern: sponsorship-yield-analytics
    dimensions: [edition_id]
    refresh: per-edition

  # Space Utilization (CORE)
  - id: revenue_per_sqft
    name: "Revenue per Square Foot"
    formula: "SUM(actual_price) / SUM(sqft) FROM fact_space_assignment WHERE assignment_status IN ('assigned','occupied')"
    pattern: space-utilization-analytics
    dimensions: [edition_id, space_type]
    refresh: per-edition
  - id: floor_plan_fill_pct
    name: "Floor Plan Fill %"
    formula: "COUNT(WHERE status IN ('assigned','occupied')) / COUNT(*) FROM fact_space_assignment"
    pattern: space-utilization-analytics
    dimensions: [edition_id, space_type]
    refresh: per-edition
  - id: listening_room_premium
    name: "Listening Room Premium"
    formula: "AVG(price WHERE type='listening_room') / AVG(price WHERE type='expo')"
    pattern: space-utilization-analytics
    dimensions: [edition_id]
    refresh: per-edition

  # Edition Performance (CORE)
  - id: edition_margin
    name: "Edition EBITDA Margin"
    formula: "(total_revenue - total_cost) / total_revenue FROM fact_edition_pnl"
    pattern: edition-performance-analytics
    dimensions: [edition_id]
    refresh: per-edition
  - id: revenue_growth_yoy
    name: "Revenue Growth YoY"
    formula: "(current.total_revenue - prior.total_revenue) / prior.total_revenue"
    pattern: edition-performance-analytics
    dimensions: [edition_id]
    refresh: per-edition

  # Attendee Demand (SUPPORTING)
  - id: attendee_count
    name: "Attendee Count"
    formula: "COUNT(WHERE checked_in = 1) FROM fact_registration"
    pattern: attendee-demand-analytics
    dimensions: [edition_id, ticket_type]
    refresh: per-edition
  - id: ticket_arpu
    name: "Ticket ARPU"
    formula: "SUM(ticket_price) / COUNT(*) FROM fact_registration"
    pattern: attendee-demand-analytics
    dimensions: [edition_id]
    refresh: per-edition

  # Lead Effectiveness (SUPPORTING)
  - id: leads_per_exhibitor
    name: "Leads per Exhibitor"
    formula: "COUNT(*) / COUNT(DISTINCT exhibitor_id) FROM fact_lead_capture"
    pattern: lead-effectiveness-analytics
    dimensions: [edition_id]
    refresh: per-edition
