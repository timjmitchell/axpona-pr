# @generated by /derive-manifests on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# Governance Layer — Data Quality Rules + Coherence Monitoring

governance:
  engagement: "axpona-pr#3"

  data_quality:
    # CORE: Exhibitor
    - id: dq-exhibitor-rebooking-completeness
      context: exhibitor
      rule: "Every exhibitor_edition record must have rebooked_within_30d populated within 45 days of show close"
      severity: critical
      source: "CRM / rebooking records"
      action: "Alert sales team — missing rebooking data for exhibitor"

    - id: dq-exhibitor-no-orphan-assignments
      context: exhibitor
      rule: "Every fct_space_assignment.exhibitor_id must exist in dim_exhibitor"
      severity: critical
      source: "CRM + floor plan tool"
      action: "Reconcile — exhibitor exists in floor plan but not CRM"

    - id: dq-exhibitor-revenue-reconciliation
      context: exhibitor
      rule: "SUM(fct_exhibitor_edition.total_revenue) per edition must match accounting total within 5%"
      severity: warning
      source: "CRM + QuickBooks"
      action: "Investigate discrepancy — likely categorization or timing difference"

    # CORE: Sponsorship
    - id: dq-sponsorship-delivery-verification
      context: sponsorship
      rule: "Every sold sponsorship must reach 'delivered' or 'verified' status within 30 days of show close"
      severity: warning
      source: "Sponsorship tracking"
      action: "Flag unverified deliverables — sponsor satisfaction risk"

    - id: dq-sponsorship-inventory-completeness
      context: sponsorship
      rule: "sponsorship_package table must have all available items before sales open"
      severity: warning
      source: "Sponsorship tracking"
      action: "Missing packages may cause sell-through miscalculation"

    # CORE: Exhibition Space
    - id: dq-space-dimensions-populated
      context: exhibition-space
      rule: "Every dim_space record must have sqft > 0"
      severity: critical
      source: "Floor plan tool"
      action: "Revenue per sqft calculation requires dimensions"

    - id: dq-space-no-double-assignment
      context: exhibition-space
      rule: "No space_id should have more than one 'assigned' or 'occupied' exhibitor per edition"
      severity: critical
      source: "Floor plan tool"
      action: "Double-assignment = operational error"

    # CORE: Event
    - id: dq-edition-pnl-completeness
      context: event
      rule: "fct_edition_pnl must be populated within 60 days of show close"
      severity: warning
      source: "QuickBooks"
      action: "P&L data needed for edition performance analytics"

  coherence:
    ubiquitous_language_source: "outside-in/UBIQUITOUS_LANGUAGE.md"
    monitoring_targets:
      - context: exhibitor
        sources: ["CRM / Spreadsheet"]
        check: "CRM uses 'exhibitor' not 'vendor' or 'client'; space types match domain enum"
      - context: sponsorship
        sources: ["Sponsorship tracking"]
        check: "Tier names match domain model (title/platinum/gold/silver/bronze/custom/individual)"
      - context: attendee
        sources: ["Unity Event Solutions"]
        check: "Ticket types match domain enum; 'attendee' not 'visitor' or 'guest'"
      - context: exhibition-space
        sources: ["Floor plan tool"]
        check: "Space types match domain enum (listening_room, expo, ear_gear, car_audio, alti)"
