# @generated by /derive-topology on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
# AXPONA — Customer Repo Topology
#
# Derived from DDD context map (STRATEGIC_DDD.md), system inventory,
# scale projection (agentic explicit-enterprise framing), and vendor
# decompositions. Each repo is an agent governance boundary.
#
# See: DD-0011 v0.2.0 (Customer Repo Topology), ADR-0016
#
# Key insight: the agentic explicit-enterprise framing collapses the
# typical multi-repo vendor integration pattern into a single domain
# repo + data repo. All capabilities run as agents against PostgreSQL
# + Qdrant, not as integrations with SaaS vendors.
#
# Derivation method:
#   1. Context map → all contexts use Customer-Supplier or Shared Kernel
#      (no ACL boundaries that force repo splits within the domain)
#   2. System inventory → single PostgreSQL + Qdrant cluster (no vendor APIs)
#   3. Single-writer → each context has clear aggregate root ownership
#   4. Vendor decompositions → all vendors on replacement track (agentic)
#   5. Scale projection → 0 Blocking, all contexts agent-operable

repos:

  axpona-domain:
    role: customer-implementation
    layer: orchestration
    bounded_contexts:
      - exhibitor
      - sponsorship
      - exhibition-space
      - event
      - attendee
      - interaction
      - agreement
      - finance
    capabilities:
      # CORE
      - exhibitor-lifecycle-management
      - sponsorship-inventory-and-yield
      - exhibition-space-optimization
      - event-edition-lifecycle
      # SUPPORTING
      - attendee-registration
      - lead-capture-and-delivery
      # GENERIC
      - contract-and-financial-management
    integration_patterns:
      - type: Shared-Kernel
        target: axpona-data
        direction: bidirectional
        lifecycle_stage: native
        notes: "Domain repo writes to PostgreSQL; data repo reads for analytics"
    dependencies:
      - axpona-data
    notes: >
      All 8 bounded contexts co-located in one repo because the agentic stack
      eliminates the vendor integration boundaries that typically force repo
      splits. No ACL translations needed — agents operate the domain model
      directly against PostgreSQL. The agent runtime serves all 38 capabilities
      with human-in-the-loop for 5 reasoning-level capabilities. This is the
      DDD correction: naive architecture would split exhibitor CRM, sponsorship
      tracker, floor plan tool, registration, and accounting into 5+ repos
      mirroring 5+ vendor integrations. The explicit-enterprise approach
      collapses them into one governance boundary because the data model is
      unified and the agent runtime is shared.

  axpona-data:
    role: customer-implementation
    layer: analytics
    bounded_contexts: []   # no domain logic — pure data pipeline
    capabilities:
      # Analytics patterns
      - exhibitor-retention-analytics
      - sponsorship-yield-analytics
      - space-utilization-analytics
      - edition-performance-analytics
      - attendee-demand-analytics
      - lead-effectiveness-analytics
      - financial-health-analytics
      # Data pipeline
      - bronze-extraction
      - silver-transformation
      - gold-analytics
      # Corpus
      - corpus-ingestion
      - corpus-querying
    integration_patterns:
      - type: Shared-Kernel
        target: axpona-domain
        direction: bidirectional
        lifecycle_stage: native
      - type: Conformist
        target: unity-event-solutions
        direction: inbound
        lifecycle_stage: replacement
        notes: "Extraction during transition; replaced by native registration in axpona-domain"
      - type: Conformist
        target: wordpress
        direction: inbound
        lifecycle_stage: extraction
        notes: "Website content extraction for corpus. WordPress stays as public site."
    dependencies: []
    notes: >
      Analytics and data pipeline repo. Owns the bronze→silver→gold pipeline,
      corpus infrastructure (Qdrant), and all 7 analytics patterns producing
      16 metrics. No domain logic — reads from axpona-domain's PostgreSQL and
      writes analytical outputs back. Separated from domain repo because the
      data pipeline has a different deployment cadence (batch CronJobs vs.
      interactive agent runtime) and different team concerns (data quality
      governance vs. domain operations).

# --- Vendor References (lifecycle tracking) ---
# These are not repos we build — they're external systems being replaced
# or retained. Listed here for governance tracking.

vendors:
  unity-event-solutions:
    status: replacement-track
    current_contexts: [attendee]
    primitives_replaced_by: "axpona-domain agent runtime (registration, check-in, badge)"
    timeline: "Replace when axpona-domain API is load-tested for show-week burst"

  wordpress:
    status: retained
    current_contexts: [event]
    notes: "Public website stays on WordPress. Content extracted to corpus for agent reasoning."

  quickbooks-equivalent:
    status: replacement-track
    current_contexts: [finance]
    primitives_replaced_by: "axpona-domain agent runtime (invoicing, AR, revenue allocation)"
    timeline: "Replace after first edition with parallel-run validation"

  badge-scanning-vendor:
    status: retained
    current_contexts: [interaction]
    notes: "Physical hardware retained. Data ingested via API to axpona-domain."

  crm-spreadsheet:
    status: replacement-track
    current_contexts: [exhibitor, sponsorship]
    primitives_replaced_by: "axpona-domain agent runtime (pipeline tracking, contact management, rebooking)"
    timeline: "Immediate — spreadsheet data migrated to PostgreSQL on day one"

  contract-management:
    status: replacement-track
    current_contexts: [agreement]
    primitives_replaced_by: "axpona-domain agent runtime (contract generation, signature workflow)"
    timeline: "Phase 2 — after exhibitor and finance contexts are operational"
