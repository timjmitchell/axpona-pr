# @generated by /scale-project on 2026-04-08T00:00:00Z, target: AXPONA (JD Events LLC)
#
# AXPONA — Agent Prescriptions
#
# Each prescription derives from a Concerning capability in the Scale
# Projection (agentic explicit-enterprise, 2026-04-07). The chain:
#
#   Process → Pattern → Capability → Scale Projection (Concerning) → Prescription
#
# Unlike Ridgeline (SaaS tool adoption + agents), AXPONA is fully agentic:
# no SaaS vendors, all capabilities run as agents against PostgreSQL + Qdrant.
# The prescriptions focus on KNOWLEDGE EXTRACTION — getting tacit expertise
# from 3 people into corpus so agents can operate on it.
#
# Grouped by investment phase. Ordered by revenue impact.
# Step 9 of engagement-lifecycle.md

prescriptions:

  # ============================================================
  # PHASE 1: KNOWLEDGE EXTRACTION (Month 1-2)
  # Highest-value tacit knowledge → corpus. Enables agent operation.
  # ============================================================

  - id: rx-rebooking-advisor
    type: agent
    phase: 1
    capability: exhibitor-rebooking-processing
    context: exhibitor
    pattern: exhibitor-lifecycle-management
    cognitive_load: reasoning
    current_state: "manual — 2 sales people use relationship knowledge to prioritize and close rebookings in 30-day window"
    target_state: "agent-assisted — agent ranks, recommends, drafts outreach; human makes relationship contact"

    description: >
      THE highest-ROI prescription. Exhibitor rebooking predicts 74% of
      next-year revenue. Agent augments the 30-day post-show rebooking
      window by: (1) scoring each exhibitor's rebooking probability from
      structured data + corpus signals, (2) prioritizing outreach order,
      (3) drafting personalized rebooking outreach, (4) tracking responses.
      Human makes the call and closes — the relationship is the moat.

    knowledge_extraction:
      sources:
        - who: "Mark Freed, Ryan Pearson (exhibitor sales)"
          what: "Rebooking decision factors — what signals predict a rebook vs. churn?"
          method: "Structured interview → corpus document"
          output: "exhibitor-rebooking-signals.md"
        - who: "Historical data (fct_exhibitor_edition)"
          what: "3+ years of rebooking outcomes × exhibitor attributes"
          method: "SQL analysis → feature importance ranking"
          output: "rebooking-feature-analysis.md"
        - who: "Forum sentiment (corpus)"
          what: "Exhibitor satisfaction signals from attendee reviews of rooms"
          method: "Corpus query → per-exhibitor sentiment aggregation"
          output: "exhibitor-sentiment-scores (structured in gold layer)"

    architecture:
      trigger: "EventConcluded domain event (starts 30-day window)"
      input:
        - "fct_exhibitor_edition (history, revenue, services, space type)"
        - "exhibitor_rebooking (prior rebooking patterns)"
        - "Corpus: exhibitor-rebooking-signals.md (extracted knowledge)"
        - "Corpus: forum sentiment per exhibitor (room reviews)"
        - "fct_lead_capture (lead volume — proxy for exhibitor satisfaction)"
      processing:
        - "Score each exhibitor's rebooking probability (0-1) from features"
        - "Rank by probability × contract value (prioritize high-value at-risk)"
        - "Draft personalized outreach for each exhibitor (reference specific show experience)"
        - "Present ranked list to sales team with one-click approve/edit/skip"
        - "Track responses, update rebooking status in real-time"
      output: "Prioritized rebooking list + draft outreach per exhibitor"
      model: "claude-sonnet (reasoning required for personalization)"
      estimated_cost: "~$20/edition (750 exhibitors × ~2 prompts each)"

    phased_rollout:
      - phase: shadow
        description: "Agent scores and ranks alongside human process. Compare agent priority order to actual sales team order."
        duration: "1 edition (shadow mode during 2026 rebooking window)"
        validation: "Rank correlation between agent and human priority. Interview sales team on disagreements."
      - phase: agent-assisted
        description: "Agent presents ranked list and draft outreach. Human reviews, edits, sends."
        duration: ongoing
        validation: "Rebooking rate maintained at >= 80%. Sales team satisfaction survey."

    capabilities_unlocked:
      - exhibitor-rebooking-processing (primary)
      - exhibitor-churn-analysis (secondary — scoring model identifies churn signals)
      - retention-cohort-reporting (downstream — structured rebooking data enables cohort analysis)

  - id: rx-space-assignment-optimizer
    type: agent
    phase: 1
    capability: space-reservation-and-assignment
    context: exhibition-space
    pattern: exhibition-space-optimization
    cognitive_load: reasoning
    current_state: "manual — priority points + preferences + gut feel"
    target_state: "agent-assisted — agent runs algorithm, human reviews edge cases"

    description: >
      Formalize the space assignment algorithm that currently lives in one
      person's head. Agent computes optimal assignments based on priority
      points, exhibitor preferences, category adjacency, revenue density,
      and historical space satisfaction. Human reviews and overrides edge
      cases (VIP exhibitors, adjacency conflicts, acoustic concerns).

    knowledge_extraction:
      sources:
        - who: "Event director"
          what: "Assignment decision rules — how do you decide who gets which room?"
          method: "Structured interview → rules YAML"
          output: "space-assignment-rules.yaml"
        - who: "Historical data (fct_space_assignment)"
          what: "3+ years of assignments × exhibitor satisfaction × rebooking"
          method: "SQL analysis → assignment quality scoring"
          output: "assignment-quality-analysis.md"

    architecture:
      trigger: "FloorPlanPublished + ExhibitorContracted events"
      input:
        - "dim_space (inventory), fct_space_assignment (history)"
        - "exhibitor_rebooking (priority points)"
        - "space-assignment-rules.yaml (extracted constraints)"
        - "Exhibitor preferences (space type, location, adjacency)"
      processing:
        - "Load constraints from rules YAML (acoustic separation, category adjacency)"
        - "Score each possible assignment (priority × preference × revenue density × history)"
        - "Generate optimal assignment proposal"
        - "Flag conflicts and edge cases for human review"
      output: "Assignment proposal with confidence scores + conflict flags"
      model: "claude-haiku (constraint satisfaction, not creative reasoning)"
      estimated_cost: "~$5/edition (360 spaces × 1 prompt each)"

    phased_rollout:
      - phase: shadow
        description: "Agent proposes assignments for completed edition. Compare to actual."
        duration: "1 edition retrospective"
        validation: "Match rate between agent proposal and actual assignments"
      - phase: agent-assisted
        description: "Agent proposes, human approves/overrides"
        duration: ongoing

    capabilities_unlocked:
      - space-reservation-and-assignment (primary)
      - revenue-per-sqft-optimization (secondary — algorithm optimizes for revenue density)

  # ============================================================
  # PHASE 2: DOMAIN FORMALIZATION (Month 2-3)
  # Structured rules + corpus docs for remaining Concerning gaps.
  # ============================================================

  - id: rx-floor-plan-advisor
    type: agent
    phase: 2
    capability: floor-plan-design-and-versioning
    context: exhibition-space
    pattern: exhibition-space-optimization
    cognitive_load: reasoning
    current_state: "manual — one person's domain expertise (acoustic separation, traffic flow, category adjacency)"
    target_state: "agent-assisted — agent proposes layouts satisfying constraints, human validates acoustic quality"

    description: >
      Extract the listening room layout expertise into structured constraints.
      The floor plan design process requires domain-specific knowledge: acoustic
      separation between rooms, traffic flow optimization, category adjacency
      (speakers near amps, not near headphones), and revenue density. This
      knowledge currently lives in one person's head — single point of failure.

    knowledge_extraction:
      sources:
        - who: "Event director / floor plan owner"
          what: "Acoustic separation rules, category adjacency map, traffic flow principles"
          method: "Structured interview + floor plan annotation → constraints YAML + corpus doc"
          output: "floor-plan-constraints.yaml + floor-plan-design-principles.md"
        - who: "Venue specs (Renaissance Schaumburg)"
          what: "Room dimensions, infrastructure (power, HVAC, acoustic properties)"
          method: "Venue floor plan digitization → structured room inventory"
          output: "venue-room-catalog.yaml"

    architecture:
      trigger: "EditionPlanned event (annual planning cycle)"
      input:
        - "floor-plan-constraints.yaml (acoustic, adjacency, traffic rules)"
        - "venue-room-catalog.yaml (physical constraints)"
        - "Prior edition floor plans (what worked)"
        - "Exhibitor space type demand (from pipeline data)"
      processing:
        - "Load venue and constraint models"
        - "Generate layout options satisfying all constraints"
        - "Score each option by revenue density, exhibitor satisfaction, traffic distribution"
        - "Present top 3 options to human with tradeoff analysis"
      output: "Ranked floor plan proposals with constraint satisfaction report"
      model: "claude-sonnet (spatial reasoning + constraint satisfaction)"
      estimated_cost: "~$10/edition"

    phased_rollout:
      - phase: documentation
        description: "Extract constraints and principles only. No agent operation yet."
        duration: "1 month"
        validation: "Event director confirms constraint document is complete and accurate"
      - phase: agent-assisted
        description: "Agent proposes layouts. Human selects and refines."
        duration: ongoing

    capabilities_unlocked:
      - floor-plan-design-and-versioning (primary)
      - space-type-management (secondary — structured constraint model enables new space type evaluation)

  - id: rx-programming-curator
    type: agent
    phase: 2
    capability: programming-management
    context: event
    pattern: event-edition-lifecycle
    cognitive_load: inferential → judgment
    current_state: "manual — VP Marketing curates 33 sessions from personal speaker network"
    target_state: "agent-assisted — agent proposes program based on prior editions + feedback, human curates"

    description: >
      Build a speaker/topic knowledge graph in corpus from prior edition
      programs, attendee feedback, and industry trends. Agent proposes
      program lineup. Human curates — speaker selection is judgment
      (relationships, brand fit, audience appeal) that agents augment
      but don't replace.

    knowledge_extraction:
      sources:
        - who: "VP Marketing"
          what: "Speaker network, topic selection criteria, audience preferences"
          method: "Structured interview → corpus doc + speaker database"
          output: "speaker-network.yaml + programming-criteria.md"
        - who: "Prior edition programs (event_session table)"
          what: "Session history — topics, speakers, attendance signals"
          method: "SQL → structured program history"
          output: "program-history-analysis.md"
        - who: "Forum sentiment (corpus)"
          what: "Attendee feedback on sessions, topics they want"
          method: "Corpus query → topic demand signals"
          output: "session-demand-signals.md"

    architecture:
      trigger: "EditionPlanned event"
      input:
        - "speaker-network.yaml, programming-criteria.md (extracted knowledge)"
        - "event_session (prior programs)"
        - "Corpus: session demand signals from forums"
      processing:
        - "Identify trending topics from corpus + industry signals"
        - "Match topics to known speakers from network"
        - "Propose program lineup with schedule slots"
        - "Flag gaps: topics with demand but no speaker, speakers available but no topic fit"
      output: "Draft program proposal + speaker recommendations + gap flags"
      model: "claude-sonnet"
      estimated_cost: "~$5/edition"

    phased_rollout:
      - phase: documentation
        description: "Extract speaker network and criteria. Build topic demand analysis."
        duration: "1 month"
      - phase: agent-assisted
        description: "Agent proposes program. Human curates and selects."
        duration: ongoing

    capabilities_unlocked:
      - programming-management (primary)

  # ============================================================
  # PHASE 3: OPERATIONAL AUGMENTATION (Month 3-4)
  # Agent-assisted operations for the live show.
  # ============================================================

  - id: rx-show-coordinator
    type: agent
    phase: 3
    capability: on-site-operations
    context: event
    pattern: event-edition-lifecycle
    cognitive_load: reasoning
    current_state: "manual — 3 people physically running a 3-day event"
    target_state: "agent-assisted — agent handles digital coordination, humans handle physical"

    description: >
      During the live 3-day show, agent handles all digital coordination:
      session reminders to attendees, exhibitor service dispatch, real-time
      issue logging and triage, badge scan anomaly detection, and VIP
      coordination. Humans focus on physical presence and relationship
      management. Reduces cognitive load during the highest-intensity period.

    knowledge_extraction:
      sources:
        - who: "Event team (all 3)"
          what: "Show-day runbook — what happens hour by hour, common issues, escalation paths"
          method: "Structured interview → operational playbook"
          output: "show-day-playbook.md"
        - who: "Prior edition incident logs (if any)"
          what: "What went wrong, how it was resolved"
          method: "Retrospective → incident catalog"
          output: "incident-catalog.yaml"

    architecture:
      trigger: "ExecuteShow command (show goes live)"
      input:
        - "show-day-playbook.md (operational procedures)"
        - "event_session (schedule), exhibitor services (active orders)"
        - "Real-time: badge scan feed, issue reports, service requests"
      processing:
        - "Monitor session schedule, send reminders to speakers and attendees"
        - "Triage incoming service requests (exhibitor AV issues, room problems)"
        - "Route urgent issues to appropriate staff member"
        - "Log all issues with timestamp, resolution, and follow-up"
        - "Flag anomalies: badge scan spikes, empty sessions, no-show speakers"
      output: "Real-time issue log + automated dispatch + end-of-day summary"
      model: "claude-haiku (real-time triage, low latency needed)"
      estimated_cost: "~$30/edition (3 days × continuous monitoring)"

    phased_rollout:
      - phase: documentation
        description: "Extract show-day playbook. Document procedures."
        duration: "Pre-show (1 month before)"
      - phase: shadow
        description: "Agent monitors alongside human ops. Logs recommendations without acting."
        duration: "1 edition"
      - phase: agent-assisted
        description: "Agent sends reminders, triages issues, routes requests. Human approves dispatches."
        duration: ongoing

    capabilities_unlocked:
      - on-site-operations (primary)
      - venue-coordination (secondary — playbook includes venue coordination procedures)

  # ============================================================
  # PHASE S: STRATEGIC RESEARCH
  # Agents that discover and analyze structural peers by running
  # the SemOps pipeline against candidate companies. Unlike
  # operational agents (triggered by domain events), research
  # agents are human-invoked and learn through iteration.
  # ============================================================

  - id: rx-peer-discovery
    type: research-agent
    phase: S
    capability: competitive-comparative-analysis
    context: [event, market-analysis]
    pattern: three-layer-strategic-analysis
    cognitive_load: judgment
    current_state: "manual — peer identification done through iterative human-agent research sessions (see show-timing-location-research.md)"
    target_state: "agent-assisted — agent discovers and validates peers from baseline, human curates results"

    description: >
      Given the AXPONA baseline (classification, reference model, synthesis),
      discover structurally similar companies across verticals, validate them,
      and produce comparable baselines. This is the first step toward automated
      competitive/comparative analysis. Structural analogs share business model
      primitives (two-sided marketplace, enthusiast community, annual edition
      cycle) rather than vertical — Blade Show (knives), Fretboard Summit
      (guitars), GABF (beer) are closer analogs to AXPONA than CES or SEMA.
      The search strategy and validation criteria improve over iterations
      via agent-training.

    architecture:
      trigger: "CLI invocation with baseline reference"
      input:
        - "AXPONA baseline artifacts (classification.yaml, reference-model.yaml, business-model.yaml)"
        - "mirror/manifest.yaml (system classification, scale indicators, revenue model)"
        - "mirror/domain/outside-in/business-model-synthesis.md (domain typing, investment thesis)"
      processing:
        - phase: A-extract
          description: >
            Extract search criteria from baseline — business model primitives
            (two-sided marketplace, enthusiast community, annual edition cycle),
            revenue model shape (marketplace 0.6 + advertising/sponsorship 0.25
            + project 0.15), scale indicators (700 exhibitors, 10K attendees,
            3-person ops team), system classification (Work-dominant 0.40),
            domain characteristics (boutique, craftsman-community, geographic
            anchoring). These become the search strategy.
        - phase: B-discover
          description: >
            Search outward from extracted criteria to find candidate companies.
            Not the same as /recon (which takes a known company and finds its
            signals) — this searches from structural attributes across verticals.
            Web research for boutique enthusiast trade shows, craftsman-community
            events, exhibitor-funded models under 15K attendees.
        - phase: C-validate
          description: >
            For each candidate, run lightweight /classify to check structural
            fit against the AXPONA baseline. Score structural similarity on
            key dimensions (business model, revenue model, scale, community
            dynamics). Filter false comparisons — CES and SEMA are structural
            comparisons only (scale mismatch), while Blade Show and Fretboard
            Summit are true analogs (same business model primitives at similar
            scale).
        - phase: D-baseline
          description: >
            For validated peers, run /classify → /predict (and optionally /recon)
            to produce structured baseline artifacts. Package into comparable
            format alongside AXPONA baseline for cross-company analysis.
      output: "Peer candidate list with structural similarity scores + baseline artifacts for validated peers"
      model: "claude-sonnet (reasoning over business model structures + web research)"
      estimated_cost: "~$5-15 per research session (web research + multi-turn reasoning)"

    learning:
      method: agent-training
      what_improves:
        - "Which baseline attributes are predictive of structural similarity"
        - "Which search queries find real analogs vs. noise"
        - "What the quick-validation threshold should be for /classify fit"
        - "How deep to go on each peer (classify-only vs. classify+predict vs. full recon)"
      notes: >
        This is not a one-shot design. The first iterations will be manual
        (human runs phases A-D, agent-training captures what worked). Over
        time the agent takes on more of the discovery and validation, with
        human curating results.

    phased_rollout:
      - phase: manual-iteration
        description: "Run phases A-D manually 2-3 times. Collect training data on search strategies and validation criteria that work."
        duration: "2-3 research sessions"
        validation: "Discovered peers match quality of manually-identified peer set from show-timing-location-research.md (14 boutique craftsman shows)"
      - phase: agent-assisted
        description: "Agent runs discovery and validation. Human curates peer set and steers search direction."
        duration: ongoing
        validation: "Agent finds ≥80% of peers that human would have identified. False positive rate <30%."
      - phase: comparative-analysis
        description: "Cross-baseline queries become possible — structural patterns, gaps, and analogs are queryable. (Future issue, downstream of this.)"
        duration: future
        validation: "Comparative analysis deliverable quality approaches show-timing-location-research.md"

    capabilities_unlocked:
      - competitive-comparative-analysis (primary)
      - peer-group-identification (secondary — structural similarity scoring identifies true analogs vs. false comparisons)

  # ============================================================
  # PHASE 0: INFRASTRUCTURE (Before Phase 1)
  # Non-agent items that unblock everything else.
  # ============================================================

  - id: rx-pii-handling
    type: infrastructure
    phase: 0
    capability: all contexts with personal data
    context: all
    pattern: null
    current_state: "no formal data handling policy"
    target_state: "encryption at rest + restricted corpus access"

    description: >
      Implement PII handling before loading any data into PostgreSQL or
      Qdrant. Attendee PII (email, zip) needs encryption at rest. Purchase
      due diligence docs need restricted corpus with separate access control.
      Standard B2B exhibitor contact data is lower concern.

    implementation:
      - Enable PostgreSQL encryption at rest (TDE or filesystem encryption)
      - Create axpona-restricted namespace/collection in Qdrant for due diligence docs
      - Define access control rules (who can query restricted corpus)
      - Document data handling policy
    estimated_cost: "Configuration only — no additional services"

  - id: rx-load-test
    type: infrastructure
    phase: 0
    capability: attendee-registration-processing
    context: attendee
    pattern: attendee-registration
    current_state: "Unity Event Solutions handles show-week burst"
    target_state: "owned API validated at 10x expected load"

    description: >
      Before first edition on the agentic stack, load test the registration
      API at 10x expected concurrent traffic. 8,600 attendees register over
      ~2 weeks, with check-in burst of ~3,000/hour on Saturday morning.
      API must handle peak without degradation.

    implementation:
      - Define load profile from Unity Event Solutions historical data (if available)
      - Synthetic load test: 300 concurrent registrations/minute sustained
      - Check-in burst test: 3,000 badge scans in 60 minutes
      - Validate HPA scaling (api.yaml scales 1→10 replicas)
      - Performance baseline documented
    estimated_cost: "Engineering time only"

