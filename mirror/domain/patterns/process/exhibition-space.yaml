          acoustic quality and room size matter.
      - name: revenue-per-sqft-optimization
        cognitive_load: inferential
        description: Maximize revenue density through optimal space allocation

    steps:
      - name: evaluate_preferences
        type: observe
        description: Review exhibitor preferences, priority points, prior space history
        inputs: [exhibitor_request, priority_points, space_history, available_spaces]
