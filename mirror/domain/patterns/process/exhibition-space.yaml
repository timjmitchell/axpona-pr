processes:

  - id: axpona.exhibition-space.floor-plan-design
    name: Floor Plan Design
    apqc_reference: "4.2.1"          # Plan supply chain resources
    scope: aggregate
    aggregate_root: ExhibitionSpace
    triggers:
      - type: event
        source: Event
        name: EditionPlanned
    pattern: exhibition-space-optimization
    capabilities:
      - name: floor-plan-design-and-versioning
        cognitive_load: reasoning
        description: >
          Design floor plan layout optimizing revenue per sqft, exhibitor
          adjacency, traffic flow, and acoustic separation (listening rooms).
          Domain-specific expertise required — listening room format is unique
          to audio trade shows.

    steps:
      - name: assess_venue_capacity
        type: observe
        description: Review venue floor area, room inventory, infrastructure constraints
        inputs: [venue_specs, prior_edition_floor_plan]
        outputs: [capacity_assessment]
      - name: design_layout
        type: think
        description: >
          Allocate spaces by type (listening rooms, expo, ear gear, car audio, alti).
          Optimize for traffic flow, acoustic separation, and revenue density.
        inputs: [capacity_assessment, space_type_demand, pricing_model]
        outputs: [floor_plan_draft]
        guardrails: [max_213_listening_rooms, acoustic_separation_rules]
      - name: publish_floor_plan
        type: act
        description: Finalize and publish floor plan for exhibitor sales
        inputs: [floor_plan_draft]
        outputs: [published_floor_plan]

    reads_from: [Event]
    writes_to: [Exhibition Space]
    emits: [FloorPlanPublished]
