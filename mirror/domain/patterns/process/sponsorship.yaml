  - id: axpona.sponsorship.sales
    name: Sponsorship Sales
    apqc_reference: "3.4.2"          # Manage marketing plans
    scope: aggregate
    aggregate_root: Sponsorship
    triggers:
      - type: command
        source: Sponsorship
        name: SellSponsorship
    pattern: sponsorship-inventory-and-yield
    capabilities:
      - name: sponsorship-inventory-management
        cognitive_load: categorical
        description: Match sponsor needs to available inventory items

    steps:
      - name: present_inventory
        type: observe
        description: Show available sponsorship items with pricing to potential sponsor
        inputs: [sponsor_profile, available_inventory]
        outputs: [presentation]
      - name: close_sale
        type: act
        description: Record sold sponsorship, mark inventory as sold, generate agreement
        inputs: [selected_items, agreed_price]
        outputs: [sponsorship_record]

    reads_from: []
    writes_to: [Sponsorship, Agreement, Finance]
    emits: [SponsorshipSold]
    executor: human
    scale_projection_level: manual

  - id: axpona.sponsorship.deliverable-fulfillment
    name: Sponsorship Deliverable Fulfillment
    apqc_reference: "4.3.2"          # Produce/deliver product
    scope: saga
    aggregate_root: Sponsorship
    triggers:
      - type: event
        source: Event
        name: EventGoesLive
    pattern: sponsorship-inventory-and-yield
    capabilities:
      - name: sponsorship-deliverable-tracking
        cognitive_load: categorical
        description: Track production and placement status of each deliverable
      - name: sponsorship-delivery-verification
        cognitive_load: categorical
        description: Verify each deliverable was placed/executed as contracted

    steps:
      - name: activate_deliverables
        type: act
        description: Trigger production/placement of all contracted deliverables for live show
        inputs: [active_sponsorships, deliverable_specs]
