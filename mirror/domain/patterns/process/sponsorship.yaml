      - name: set_pricing
        type: think
        description: Adjust pricing based on fill rates, demand signals, and yield targets
        inputs: [prior_fill_rates, prior_yield, market_feedback]
        outputs: [priced_inventory]
        guardrails: [minimum_price_maintained]

    reads_from: [Finance]
    writes_to: [Sponsorship]
    emits: []
