    triggers:
      - type: event
        source: Event
        name: EditionPlanned
    pattern: sponsorship-inventory-and-yield
    capabilities:
      - name: sponsorship-inventory-management
        cognitive_load: categorical
        description: Define available sponsorship items, categories, tiers, and pricing for each edition
      - name: sponsorship-tier-pricing
        cognitive_load: inferential
        description: Set pricing based on prior yield, demand signals, and category CPM targets

    steps:
      - name: define_inventory
        type: act
        description: Create or carry forward sponsorship package definitions for new edition
        inputs: [prior_edition_packages, pricing_rules, new_items]
