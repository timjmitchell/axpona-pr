      - name: verify_placement
        type: evaluate
        description: Confirm each deliverable was placed correctly (signage up, lanyard branded, etc.)
        inputs: [activated_deliverables, on_site_verification]
        outputs: [verified_deliverables]
      - name: mark_delivered
        type: act
        description: Update delivery status, trigger final billing if needed
        inputs: [verified_deliverables]
        outputs: [delivered_sponsorship]

    reads_from: [Event]
    writes_to: [Sponsorship, Finance]
    emits: [SponsorshipDelivered]
    compensates: [OfferSubstitution, ProcessCredit]
    executor: human
    scale_projection_level: manual

  - id: axpona.sponsorship.renewal
