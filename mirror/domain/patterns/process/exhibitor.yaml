bounded_context: exhibitor
domain_type: core

processes:

  # ============================================================
  # PROSPECTING & ONBOARDING
  # ============================================================

  - id: axpona.exhibitor.prospect-identification
    name: Prospect Identification
    apqc_reference: "3.3.1"          # Identify potential customers
    scope: aggregate
    aggregate_root: Exhibitor
    triggers:
      - type: schedule
        source: Exhibitor
        name: AnnualProspectingCycle
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: lead-qualification
        cognitive_load: inferential
        description: >
          Identify and qualify new exhibitor prospects from industry contacts,
          referrals, competitor shows, and inbound inquiries. Requires synthesis
          of brand fit, category coverage gaps, and space availability.

    steps:
      - name: identify_prospects
        type: observe
        description: Review industry contacts, show attendees, referrals, inbound inquiries
        inputs: [industry_contacts, prior_attendee_list, inbound_inquiries, category_gaps]
        outputs: [prospect_list]
      - name: qualify_prospect
        type: think
        description: Assess brand fit, category alignment, space type preference, budget indicators
        inputs: [prospect_list, current_category_mix, available_spaces]
        outputs: [qualified_prospects]
        guardrails: [category_diversity_maintained]
      - name: initiate_outreach
        type: act
        description: Contact qualified prospects, present space options and packages
        inputs: [qualified_prospects, space_inventory, package_options]
        outputs: [outreach_records]

    reads_from: [Exhibition Space]
    writes_to: [Exhibitor]
    emits: []
    executor: human
    scale_projection_level: manual

  - id: axpona.exhibitor.onboarding
    name: Exhibitor Onboarding
    apqc_reference: "3.3.2"          # Manage customer pipeline
    scope: aggregate
    aggregate_root: Exhibitor
    triggers:
      - type: command
        source: Exhibitor
        name: OnboardExhibitor
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: exhibitor-onboarding
        cognitive_load: categorical
        description: >
          Create exhibitor record from application, validate company info,
          assign sales owner, determine tier eligibility.
      - name: contact-management
        cognitive_load: deterministic
        description: Store and maintain exhibitor contact records

    steps:
      - name: validate_application
        type: observe
        description: Review application for completeness, verify company identity
        inputs: [application_form, company_website]
        outputs: [validated_application]
      - name: create_exhibitor_record
        type: act
        description: Create exhibitor in CRM with contact info, category, type
        inputs: [validated_application]
        outputs: [exhibitor_record]
      - name: assign_sales_owner
        type: act
        description: Assign to Mark Freed or Ryan Pearson based on category/tier
        inputs: [exhibitor_record, sales_team_capacity]
        outputs: [assigned_exhibitor]

    reads_from: []
    writes_to: [Exhibitor]
    emits: []
    executor: human
    scale_projection_level: manual

  # ============================================================
  # CONTRACTING & SPACE ASSIGNMENT
  # ============================================================

  - id: axpona.exhibitor.contract-negotiation
    name: Contract Negotiation
    apqc_reference: "3.5.1"          # Develop and manage sales plans
    scope: service
    aggregate_root: Exhibitor
    triggers:
      - type: event
        source: Exhibitor
        name: ApplicationApproved
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: exhibitor-pipeline-tracking
        cognitive_load: categorical
        description: >
          Track exhibitor through pipeline stages (prospect → applied → contracted).
          Determine appropriate space type, services, and sponsorship add-ons.
      - name: exhibitor-package-assembly
        cognitive_load: inferential
        description: >
          Assemble custom package (space + services + sponsorship add-ons)
          based on exhibitor needs, budget, and available inventory.
      - name: sales-pipeline-stage-tracking
        cognitive_load: deterministic
        description: Update CRM pipeline stage as exhibitor progresses
      - name: sales-forecasting
        cognitive_load: inferential
        description: Project next-edition revenue from pipeline stage × probability

    steps:
      - name: assess_needs
        type: observe
        description: Discuss space needs, budget, services, sponsorship interest
        inputs: [exhibitor_record, space_inventory, sponsorship_inventory]
        outputs: [exhibitor_needs_assessment]
      - name: assemble_package
        type: think
        description: Build package combining space type, services, and sponsorship add-ons
        inputs: [exhibitor_needs_assessment, package_templates, pricing_rules]
        outputs: [proposed_package]
      - name: negotiate_terms
        type: think
        description: Negotiate price, payment terms, and package contents
        inputs: [proposed_package, exhibitor_history, priority_points]
        outputs: [agreed_terms]
        guardrails: [minimum_price_maintained, space_type_available]
      - name: finalize_contract
        type: delegate
        description: Generate agreement and send for signature
        inputs: [agreed_terms]
        outputs: [agreement_request]

    reads_from: [Exhibition Space, Sponsorship]
    writes_to: [Exhibitor, Agreement]
    emits: [ExhibitorContracted]
    executor: human
    scale_projection_level: manual

  - id: axpona.exhibitor.space-assignment-request
    name: Space Assignment Request
    apqc_reference: "4.2.1"          # Plan for supply chain resources
    scope: service
    aggregate_root: Exhibitor
    triggers:
      - type: event
        source: Exhibitor
        name: ExhibitorContracted
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: exhibitor-pipeline-tracking
        cognitive_load: deterministic
        description: Record space assignment against exhibitor record

    steps:
      - name: request_space
        type: delegate
        description: Request Exhibition Space context to assign space per contract
        inputs: [exhibitor_id, space_type, preferences]
        outputs: [space_assignment_request]

    reads_from: []
    writes_to: [Exhibition Space]
    emits: []
    executor: human
    scale_projection_level: manual

  # ============================================================
  # SERVICE FULFILLMENT
  # ============================================================

  - id: axpona.exhibitor.service-order-fulfillment
    name: Service Order Fulfillment
    apqc_reference: "4.4.1"          # Deliver products
    scope: aggregate
    aggregate_root: Exhibitor
    triggers:
      - type: command
        source: Exhibitor
        name: FulfillServiceOrder
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: exhibitor-onboarding
        cognitive_load: categorical
        description: Coordinate exhibitor service requests (drayage, AV, electrical)

    steps:
      - name: receive_service_order
        type: observe
        description: Capture service request with type, quantity, timing
        inputs: [exhibitor_id, edition_id, service_type, quantity]
        outputs: [service_order_record]
      - name: coordinate_fulfillment
        type: delegate
        description: Coordinate with venue/vendor for service delivery
        inputs: [service_order_record, vendor_contacts]
        outputs: [fulfillment_confirmation]
      - name: mark_fulfilled
        type: act
        description: Update service order status, trigger invoicing
        inputs: [fulfillment_confirmation]
        outputs: [fulfilled_service_order]

    reads_from: []
    writes_to: [Exhibitor, Finance]
    emits: [ServiceOrderFulfilled]
    executor: human
    scale_projection_level: manual

  # ============================================================
  # REBOOKING (THE CRITICAL PROCESS)
  # ============================================================

  - id: axpona.exhibitor.rebooking
    name: Exhibitor Rebooking
    apqc_reference: "5.1.3"          # Customer retention
    scope: saga
    aggregate_root: Exhibitor
    triggers:
      - type: event
        source: Event
        name: EventConcluded
    pattern: exhibitor-lifecycle-management
    capabilities:
      - name: exhibitor-rebooking-processing
        cognitive_load: reasoning
        description: >
          Process rebooking within 30-day post-show window. Requires reasoning
          about exhibitor satisfaction, space preferences, priority points,
          and next-edition availability. THE most important process — rebooking
          rate (80%) predicts next-year revenue.
      - name: exhibitor-priority-points-management
        cognitive_load: categorical
        description: Calculate and apply priority points for space selection order
      - name: activity-logging
        cognitive_load: deterministic
        description: Log rebooking interactions in CRM activity timeline

    steps:
      - name: identify_eligible_exhibitors
        type: observe
        description: List all exhibitors from concluded edition eligible for rebooking
        inputs: [edition_id, exhibitor_edition_records]
        outputs: [eligible_exhibitors]
      - name: assess_rebooking_likelihood
        type: think
        description: >
          Evaluate each exhibitor's rebooking probability based on satisfaction signals,
          lead volume, space experience, and relationship history
        inputs: [eligible_exhibitors, lead_reports, exhibitor_history]
        outputs: [prioritized_rebooking_list]
      - name: offer_rebooking
        type: act
        description: Contact exhibitor with rebooking offer, space options, priority points
        inputs: [prioritized_rebooking_list, next_edition_spaces, priority_points]
        outputs: [rebooking_offers]
      - name: process_acceptance
        type: act
        description: Accept rebooking, reserve next-edition space, update priority points
        inputs: [rebooking_acceptance, space_preference]
        outputs: [rebooking_record]
        guardrails: [within_30_day_window, space_must_be_available]
      - name: handle_decline
        type: evaluate
        description: Investigate reason for decline, log for churn analysis
        inputs: [rebooking_decline, exhibitor_history]
        outputs: [decline_record, churn_signal]

    reads_from: [Exhibition Space, Interaction, Finance]
    writes_to: [Exhibitor, Exhibition Space]
    emits: [ExhibitorRebooked]
    compensates: [ReleaseSpace]
    executor: human
    scale_projection_level: manual
