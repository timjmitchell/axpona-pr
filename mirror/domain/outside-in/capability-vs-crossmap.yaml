plan_to_retain:
  stages:
    - stage: "1. Plan Show"
      exit_event: FloorPlanPublished
      capabilities:
        Event:
          role: writer
          action: "Creates edition, sets dates, coordinates venue"
        Exhibition Space:
          role: writer
          action: "Designs floor plan, defines space inventory"

    - stage: "2. Sell Space"
      exit_event: ExhibitorContracted
      capabilities:
        Exhibitor:
          role: writer
          action: "Prospects, reviews applications, negotiates contracts"
        Exhibition Space:
          role: writer
          action: "Reserves and assigns spaces"
        Sponsorship:
          role: writer
          action: "Sells sponsorship inventory, assembles packages"
        Agreement:
          role: writer
          action: "Generates and activates contracts"
        Finance:
          role: writer
          action: "Invoices deposits, processes payments"

    - stage: "3. Market Show"
      exit_event: AttendeeRegistered
      capabilities:
        Attendee:
          role: writer
          action: "Processes registrations, issues tickets"
        Event:
          role: reader
          action: "Provides programming info for marketing"

    - stage: "4. Execute Show"
      exit_event: EventConcluded
      capabilities:
        Event:
          role: writer
          action: "Manages on-site operations, sessions, logistics"
        Interaction:
          role: writer
          action: "Captures leads via badge scanning"
        Attendee:
          role: reader
          action: "Check-in, badge activation"
        Sponsorship:
          role: reader
          action: "Deliverable activation and placement"
        Exhibitor:
          role: reader
          action: "Service order fulfillment"

    - stage: "5. Retain & Grow"
      exit_event: ExhibitorRebooked
      capabilities:
        Exhibitor:
          role: writer
          action: "Processes rebookings, updates priority points"
        Interaction:
          role: reader
          action: "Delivers lead reports to exhibitors"
        Sponsorship:
          role: reader
          action: "Presents renewal opportunities"
        Finance:
          role: writer
          action: "Reconciles edition P&L, allocates revenue"

  # Matrix summary:
  #
  #                  | Event | ExhibSpace | Exhibitor | Sponsor | Agreement | Finance | Attendee | Interaction |
  # -----------------|-------|------------|-----------|---------|-----------|---------|----------|-------------|
  # 1. Plan Show     | WRITE | WRITE      |           |         |           |         |          |             |
  # 2. Sell Space    |       | WRITE      | WRITE     | WRITE   | WRITE     | WRITE   |          |             |
  # 3. Market Show   | read  |            |           |         |           |         | WRITE    |             |
  # 4. Execute Show  | WRITE |            | read      | read    |           |         | read     | WRITE       |
  # 5. Retain & Grow |       |            | WRITE     | read    |           | WRITE   |          | read        |

  saga_derivation: >
    The Edition Lifecycle saga maps directly to this value stream. Each stage
    has a primary writer (the context that owns the exit event) and readers
    (contexts that consume the event). The Sell stage has the most participants
    (5 contexts) because contracting touches exhibitors, space, sponsorship,
    agreements, and finance simultaneously. Retain stage is where the cycle
    feeds back — ExhibitorRebooked triggers next-edition space reservation.

