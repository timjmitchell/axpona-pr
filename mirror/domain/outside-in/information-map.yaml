# @generated by /derive on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# AXPONA — Information Map
#
# BIZBOK deliverable: business objects, states, types, relationships
# → DDD aggregates, entities, VOs, state machines

information_concepts:

  # ═══════════════════════════════════════════════════════════════════════════
  # PRIMARY INFORMATION CONCEPTS (aggregate roots — anchor bounded contexts)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: exhibitor
    name: Exhibitor
    category: primary
    anchors_context: [Exhibitor]
    ddd_pattern: aggregate_root
    states:
      - prospected
      - applied
      - contracted
      - confirmed
      - attended
      - rebooking
    types:
      - listening_room     # premium — private demo space
      - expo_booth         # standard exhibit hall
      - ear_gear           # headphone/portable
      - car_audio          # vehicle-based demo
      - alti               # premium lifestyle
    relationships:
      modifies:
        - Exhibitor (full lifecycle — single writer)
      uses:
        - Exhibition Space (reads space availability)
        - Agreement (reads contract terms)
        - Finance (reads payment status)
        - Interaction (reads lead data post-show)

  - id: sponsorship
    name: Sponsorship
    category: primary
    anchors_context: [Sponsorship]
    ddd_pattern: aggregate_root
    states:
      - proposed
      - sold
      - contracted
      - active
      - delivered
      - reported
    types:
      - signage            # physical signage placements
      - digital            # website, app, email placements
      - experience         # branded lounge, reception, concert
      - print              # program guide, badge insert
      - lanyard            # badge lanyard branding
      - naming_rights      # room or area naming
    relationships:
      modifies:
        - Sponsorship (full lifecycle — single writer)
      uses:
        - Interaction (reads audience metrics for ROI)
        - Agreement (reads contract terms)
        - Finance (reads billing status)

  - id: exhibition-space
    name: ExhibitionSpace
    category: primary
    anchors_context: [Exhibition Space]
    ddd_pattern: aggregate_root
    states:
      - planned
      - available
      - reserved
      - assigned
      - occupied
      - vacated
    types:
      - listening_room
      - expo
      - ear_gear
      - car_audio
      - alti
    relationships:
      modifies:
        - Exhibition Space (space lifecycle — single writer)
      uses:
        - Exhibitor (reads exhibitor assignment)
        - Event (reads edition timeline)

  - id: event
    name: Event
    category: primary
    anchors_context: [Event]
    ddd_pattern: aggregate_root
    states:
      - planning
      - open
      - live
      - post_show
      - archived
    types:
      - annual_edition     # the primary show
    relationships:
      modifies:
        - Event (edition lifecycle — single writer)
      uses:
        - Exhibition Space (reads floor plan)
        - Exhibitor (reads exhibitor count for programming)

  - id: attendee
    name: Attendee
    category: primary
    anchors_context: [Attendee]
    ddd_pattern: aggregate_root
    states:
      - registered
      - ticketed
      - checked_in
      - no_show
    types:
      - general_admission
      - friday_pass
      - saturday_pass
      - sunday_pass
      - vip
      - trade_pass
    relationships:
      modifies:
        - Attendee (registration lifecycle — single writer via Unity Events)
      uses:
        - Event (reads edition info)
        - Interaction (provides attendee identity for lead capture)

  - id: interaction
    name: Interaction
    category: primary
    anchors_context: [Interaction]
    ddd_pattern: aggregate_root
    states:
      - planned
      - in_progress
      - past
    types:
      - badge_scan         # exhibitor scans attendee badge
      - lead_report        # post-show lead summary
    relationships:
      modifies:
        - Interaction (lead capture — single writer)
      uses:
        - Attendee (reads attendee identity)
        - Exhibitor (delivers leads to exhibitor)

  - id: agreement
    name: Agreement
    category: primary
    anchors_context: [Agreement]
    ddd_pattern: aggregate_root
    states:
      - pending
      - in_force
      - terminated
      - abandoned
    types:
      - exhibitor_contract
      - sponsorship_agreement
      - venue_lease
      - vendor_sow
    relationships:
      modifies:
        - Agreement (contract lifecycle — single writer)
      uses:
        - Exhibitor (reads contract terms)
        - Sponsorship (reads sponsorship agreement)
        - Finance (reads payment schedule)

  - id: financial-account
    name: FinancialAccount
    category: primary
    anchors_context: [Finance]
    ddd_pattern: aggregate_root
    states:
      - pending
      - open
      - closed
      - suspended
    types:
      - exhibitor_account
      - sponsor_account
      - attendee_account
      - vendor_account
    relationships:
      modifies:
        - Finance (financial lifecycle — single writer)
      uses:
        - Exhibitor (reads payment status)
        - Agreement (reads contract terms for billing)

  # ═══════════════════════════════════════════════════════════════════════════
  # SECONDARY INFORMATION CONCEPTS (entities within contexts)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: rebooking-record
    name: RebookingRecord
    category: secondary
    parent_context: Exhibitor
    ddd_pattern: entity
    states: [eligible, offered, accepted, declined, lapsed]
    relationships:
      modifies:
        - Exhibitor (writes rebooking status)
      uses:
        - Exhibition Space (reserves next-edition space)
        - Finance (triggers rebooking deposit)

  - id: floor-plan
    name: FloorPlan
    category: secondary
    parent_context: Exhibition Space
    ddd_pattern: entity
    states: [draft, published, final, archived]
    relationships:
      modifies:
        - Exhibition Space (floor plan versioning)
      uses:
        - Exhibitor (reads available spaces)
        - Event (reads for programming layout)

  - id: session
    name: Session
    category: secondary
    parent_context: Event
    ddd_pattern: entity
    states: [proposed, confirmed, scheduled, live, completed]
    relationships:
      modifies:
        - Event (session lifecycle)

  - id: lead-record
    name: LeadRecord
    category: secondary
    parent_context: Interaction
    ddd_pattern: entity
    states: [captured, qualified, followed_up, converted, dead]
    relationships:
      modifies:
        - Interaction (writes lead data)
      uses:
        - Exhibitor (reads for ROI reporting)

  - id: invoice
    name: Invoice
    category: secondary
    parent_context: Finance
    ddd_pattern: entity
    states: [draft, sent, paid, overdue, cancelled]
    relationships:
      modifies:
        - Finance (invoice lifecycle)
      uses:
        - Exhibitor (reads billing status)
        - Sponsorship (reads sponsorship billing)

# ═══════════════════════════════════════════════════════════════════════════
# VALUE OBJECTS (identity-less, immutable)
# ═══════════════════════════════════════════════════════════════════════════

value_objects:
  - name: PriorityPoints
    used_by: [Exhibitor]
    description: "Seniority-based booth selection order {points, earnedFromEditionId}"
  - name: ExhibitorPackage
    used_by: [Exhibitor]
    description: "Bundle of space + services + sponsorship add-ons {space, services[], addOns[], totalPrice}"
  - name: SponsorshipPackage
    used_by: [Sponsorship]
    description: "Tier + price + deliverables + exclusivity {tier, price, deliverables[], exclusivityFlag}"
  - name: SpaceDimensions
    used_by: [Exhibition Space]
    description: "Physical attributes {width, depth, sqft, cornerFlag, electricalAccess}"
  - name: SpaceType
    used_by: [Exhibition Space]
    description: "Enum: listening_room, expo, ear_gear, car_audio, alti"
  - name: Ticket
    used_by: [Attendee]
    description: "Access level + price {ticketType, price, accessLevel}"
  - name: Badge
    used_by: [Attendee]
    description: "Physical credential {attendeeId, editionId, badgeType, accessLevel}"
  - name: MonetaryAmount
    used_by: [Finance, Sponsorship, Exhibitor]
    description: "Amount + currency pair"
  - name: ContactInfo
    used_by: [Exhibitor, Attendee]
    description: "Name, email, phone, company"
  - name: EditionDateRange
    used_by: [Event]
    description: "Start date, end date, setup days"
  - name: PaymentSchedule
    used_by: [Agreement]
    description: "Installment schedule {installments[], dueDate}"
  - name: RevenueAllocation
    used_by: [Finance]
    description: "Maps payment to edition + revenue category {editionId, category, amount}"
