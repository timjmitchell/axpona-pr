# --- Gaps and Flags ---

gaps_and_flags:
  - type: no_catalog_gap
    description: >
      Advertising model maps to ad-supported-media.yaml, but AXPONA's
      sponsorship is physical-event inventory (lanyards, signage, lounges),
      not digital impressions. The catalog's digital ad capabilities
      (programmatic, header bidding, SSPs) don't apply. The event-marketplace
      catalog's "Sponsorship Inventory and Sales" capability is more accurate.
    action: "Use event-marketplace sponsorship capability as primary; ad-supported-media metrics (CPM, fill rate) apply in adapted form"

  - type: cross_domain
    description: >
      Exhibitor lifecycle management mirrors CRM/sales pipeline patterns.
      The rebooking cycle is functionally a B2B sales renewal pipeline
      with 80% retention. SaaS retention patterns may inform exhibitor
      health scoring.
    action: "Flag for synthesis — potential cross-pollination from SaaS retention patterns"

  - type: cross_domain
    description: >
      Listening room format is domain-specific to audio trade shows.
      No generic trade show, marketplace, or events pattern covers the
      private demo space concept. This is where Exhibition Space earns
      CORE classification — it's the vertical's competitive innovation.
    action: "Flag for synthesis — vertical-specific entity, not derivable from catalogs"

  - type: revenue_confirmed
    description: >
      Revenue confirmed at $2.1M (2025) from offering memorandum — <$5M tier,
      not the original $5M-$20M estimate. Scale-dependent predictions updated:
      APQC IT process not expected, DCAM level 1, minimal analytics maturity.
      Only 3 direct staff (not 20-30 estimated).
    action: "Scale assumptions now grounded in confirmed financials. No further action."

  - type: high_margin_signal
    description: >
      36% EBITDA margin on $2.1M revenue ($780K EBITDA) with only $263K in
      employee compensation. 49% gross margin trending upward. Revenue growing
      ~22% CAGR post-COVID. This is an exceptionally efficient operation —
      3 people generating $780K EBITDA on a mature event franchise.
    action: "Flag for synthesis — margin profile suggests acquisition premium. Operational leverage is the story."
