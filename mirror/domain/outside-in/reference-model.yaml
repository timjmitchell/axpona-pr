# --- Analytics ---

analytics:
  business_model_metrics:
    # Marketplace (weight 0.60) — primary
    - name: GMV
      business_model: marketplace
      formula: "SUM(transaction_value)"
      benchmarks:
        healthy: "Consistent growth with improving take rate"
        warning: "GMV growing but revenue flat"
      fact_source: "transactions_fact"
    - name: Take Rate
      business_model: marketplace
      formula: "total_revenue / gmv"
      benchmarks:
        healthy: "5-20% depending on category"
        warning: "Declining without GMV growth"
      fact_source: "transactions_fact"
    - name: Liquidity
      business_model: marketplace
      formula: "COUNT(transacted_listings) / COUNT(total_listings)"
      benchmarks:
        healthy: ">30% for goods, >15% for services"
        warning: "<10%"
      fact_source: "transactions_fact"
      notes: "For AXPONA: floor plan fill rate (spaces sold / available)"
    - name: Repeat Rate
      business_model: marketplace
      formula: "COUNT(users_with_2plus_transactions) / COUNT(all_transacting_users)"
      benchmarks:
        healthy: ">50% within 12 months"
        warning: "<20%"
      fact_source: "transactions_fact"
      notes: "For AXPONA: exhibitor rebooking rate (confirmed at 80%)"
    - name: Supply Growth
      business_model: marketplace
      formula: "COUNT(new_sellers_this_period)"
      benchmarks:
        healthy: "Organic exceeding paid"
        warning: "Declining without saturation"
      fact_source: "transactions_fact"
      notes: "New exhibitor acquisition per edition"
    - name: Buyer/Seller Ratio
      business_model: marketplace
      formula: "COUNT(active_buyers) / COUNT(active_sellers)"
      benchmarks:
        healthy: "Stable ratio"
        warning: "Rapid shift"
      fact_source: "transactions_fact"
      notes: "Attendee-to-exhibitor ratio"

    # Advertising (weight 0.25) — secondary
    - name: Fill Rate
      business_model: advertising
      formula: "COUNT(sold_impressions) / COUNT(available_impressions)"
      benchmarks:
        healthy: ">80%"
        warning: "<50%"
      fact_source: "ad_impressions_fact"
      notes: "Sponsorship slots sold / available. Heavy SOLD markers = demand > supply"
    - name: CPM Equivalent
      business_model: advertising
      formula: "sponsorship_revenue / (attendee_count / 1000)"
      benchmarks:
        healthy: "Stable or increasing"
        warning: "Declining"
      fact_source: "ad_impressions_fact"
      notes: "Sponsorship yield per 1000 attendees"
    - name: Sell-Through Rate
      business_model: advertising
      formula: "COUNT(premium_sold) / COUNT(premium_available)"
      benchmarks:
        healthy: ">90% premium"
        warning: "Heavy SOLD markers indicate pricing opportunity"
      fact_source: "ad_impressions_fact"

    # Project (weight 0.15) — tertiary
    - name: Edition Margin
      business_model: project
      formula: "(edition_revenue - edition_cost) / edition_revenue"
      benchmarks:
        healthy: ">20%"
        warning: "<5%"
      fact_source: "project_revenue_fact"
    - name: On-Time Delivery
      business_model: project
      formula: "COUNT(delivered_on_time) / COUNT(completed_editions)"
      benchmarks:
        healthy: ">85%"
        warning: "<70%"
      fact_source: "project_revenue_fact"

