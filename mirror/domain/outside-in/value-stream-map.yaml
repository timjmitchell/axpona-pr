# @generated by /derive on 2026-04-07T00:00:00Z, target: AXPONA (JD Events LLC)
#
# AXPONA — Value Stream Maps
#
# BIZBOK deliverable: Value Stream Maps with stage exit criteria → DDD domain events

value_streams:

  # ═══════════════════════════════════════════════════════════════════════════
  # PRIMARY VALUE STREAMS (customer-facing, revenue-generating)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: plan-to-retain
    name: "Plan to Retain (Edition Lifecycle)"
    triggering_stakeholder: "Event organizer (JD Events)"
    value_proposition: >
      Produce and execute an annual trade show edition that generates revenue
      from exhibitors, sponsors, and attendees while maintaining 80% exhibitor
      rebooking rate.
    stages:

      - stage: 1
        name: Plan Show
        entrance_criteria: "Prior edition archived, venue contract confirmed"
        exit_criteria: "Floor plan published, registration open"
        exit_event: FloorPlanPublished
        enabling_capabilities:
          - Event (edition creation, date setting, venue coordination)
          - Exhibition Space (floor plan design, space inventory)
        participating_contexts: [Event, Exhibition Space]

      - stage: 2
        name: Sell Space
        entrance_criteria: "Floor plan published, spaces available"
        exit_criteria: "Exhibitor contracted, space assigned, agreement in force"
        exit_event: ExhibitorContracted
        enabling_capabilities:
          - Exhibitor (prospecting, application review, contract negotiation)
          - Exhibition Space (space assignment, reservation management)
          - Sponsorship (inventory presentation, package assembly)
          - Agreement (contract generation, activation)
          - Finance (invoicing, deposit collection)
        participating_contexts: [Exhibitor, Exhibition Space, Sponsorship, Agreement, Finance]

      - stage: 3
        name: Market Show
        entrance_criteria: "Registration open, exhibitor lineup confirmed"
        exit_criteria: "Target attendance reached, marketing complete"
        exit_event: AttendeeRegistered
        enabling_capabilities:
          - Attendee (registration, ticketing via Unity Events)
          - Event (programming announcement, speaker confirmation)
        participating_contexts: [Attendee, Event]

      - stage: 4
        name: Execute Show
        entrance_criteria: "Event goes live, attendees arriving"
        exit_criteria: "3-day event completed, all sessions delivered"
        exit_event: EventConcluded
        enabling_capabilities:
          - Event (on-site operations, session management)
          - Interaction (badge scanning, lead capture)
          - Attendee (check-in, badge activation)
          - Sponsorship (deliverable activation and placement)
          - Exhibitor (service order fulfillment)
        participating_contexts: [Event, Interaction, Attendee, Sponsorship, Exhibitor]

      - stage: 5
        name: Retain & Grow
        entrance_criteria: "Event concluded, rebooking window opens"
        exit_criteria: "80%+ exhibitors rebooked, ROI reports delivered, P&L closed"
        exit_event: ExhibitorRebooked
        enabling_capabilities:
          - Exhibitor (rebooking, priority points update)
          - Interaction (lead report delivery)
          - Sponsorship (renewal opportunity, next-year inventory)
          - Finance (edition P&L reconciliation, revenue allocation)
        participating_contexts: [Exhibitor, Interaction, Sponsorship, Finance]

    ddd_mapping:
      saga: Edition Lifecycle
      compensation_events:
        - ExhibitorCancelled → Exhibition Space releases assignment, Finance processes forfeiture
        - VenueUnavailable → Event reschedules, all contexts notified
        - EditionCancelled → Full unwind (COVID precedent 2020-2021)

  # ═══════════════════════════════════════════════════════════════════════════

  - id: prospect-to-rebook
    name: "Prospect to Rebook (Exhibitor Lifecycle)"
    triggering_stakeholder: "Exhibitor (audio brand)"
    value_proposition: >
      Exhibitor accesses 8,600+ qualified audiophile attendees through a
      premium listening room or booth experience, then rebooks for next year.
    stages:

      - stage: 1
        name: Prospect & Apply
        entrance_criteria: "Brand identified as potential exhibitor"
        exit_criteria: "Application submitted, space type selected"
        exit_event: null  # internal to Exhibitor
        enabling_capabilities:
          - Exhibitor (outreach, application intake)
        participating_contexts: [Exhibitor]

      - stage: 2
        name: Contract & Assign
        entrance_criteria: "Application approved, space available"
        exit_criteria: "Agreement signed, space assigned, deposit collected"
        exit_event: ExhibitorContracted
        enabling_capabilities:
          - Exhibitor (contract negotiation, package assembly)
          - Exhibition Space (space reservation, assignment)
          - Agreement (contract activation)
          - Finance (deposit invoicing)
        participating_contexts: [Exhibitor, Exhibition Space, Agreement, Finance]

      - stage: 3
        name: Prepare & Attend
        entrance_criteria: "Contract in force, show approaching"
        exit_criteria: "Exhibitor on-site, services fulfilled, leads captured"
        exit_event: ServiceOrderFulfilled
        enabling_capabilities:
          - Exhibitor (service order coordination)
          - Interaction (lead capture activation)
        participating_contexts: [Exhibitor, Interaction]

      - stage: 4
        name: Rebook & Renew
        entrance_criteria: "Event concluded, 30-day rebooking window"
        exit_criteria: "Rebooking accepted, space reserved for next edition"
        exit_event: ExhibitorRebooked
        enabling_capabilities:
          - Exhibitor (rebooking offer, priority points)
          - Exhibition Space (next-edition space reservation)
          - Finance (rebooking deposit)
        participating_contexts: [Exhibitor, Exhibition Space, Finance]

    ddd_mapping:
      saga: Edition Lifecycle (Sell → Execute → Retain stages)
      compensation_events:
        - ExhibitorCancelled → Space released, forfeiture applied per agreement terms

  # ══��════════════════════════════════════════════════════════════════════════
  # SECONDARY VALUE STREAMS (internal/enabling)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: sponsor-to-renew
    name: "Sponsor to Renew (Sponsorship Lifecycle)"
    triggering_stakeholder: "Sponsor (exhibitor or external partner)"
    value_proposition: >
      Sponsor gains audience attention through premium placements (physical
      and digital) with verified delivery and measurable ROI.
    stages:

      - stage: 1
        name: Sell Sponsorship
        entrance_criteria: "Sponsorship inventory available for edition"
        exit_criteria: "Sponsorship sold, agreement activated"
        exit_event: SponsorshipSold
        enabling_capabilities:
          - Sponsorship (inventory presentation, tier selection)
          - Agreement (sponsorship contract)
          - Finance (sponsorship invoicing)
        participating_contexts: [Sponsorship, Agreement, Finance]

      - stage: 2
        name: Deliver & Verify
        entrance_criteria: "Event live, deliverables activated"
        exit_criteria: "All deliverables verified as placed/executed"
        exit_event: SponsorshipDelivered
        enabling_capabilities:
          - Sponsorship (deliverable activation, verification)
          - Event (on-site placement coordination)
        participating_contexts: [Sponsorship, Event]

      - stage: 3
        name: Report & Renew
        entrance_criteria: "Event concluded, deliverables verified"
        exit_criteria: "ROI data provided, renewal opportunity presented"
        exit_event: null  # internal to Sponsorship
        enabling_capabilities:
          - Sponsorship (renewal offer)
          - Finance (final billing)
        participating_contexts: [Sponsorship, Finance]

    ddd_mapping:
      saga: Sponsorship Fulfillment
      compensation_events:
        - DeliverableFailed → Sponsorship offers substitution or credit
        - SponsorCancelled → Finance refund, inventory returned to available
